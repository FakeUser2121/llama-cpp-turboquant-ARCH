name: Build and Release llama.cpp (Windows GTX 1650)

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    permissions:
      contents: write

    env:
      CCACHE_DIR: ${{ github.workspace }}\.ccache

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compiler Cache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: ccache-${{ runner.os }}-${{ github.sha }}
          variant: ccache
          evict-old-files: 1d

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "13.2.0"

      - name: Install 7-Zip
        shell: pwsh
        run: choco install 7zip -y

      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DGGML_CUDA=ON ^
            -DGGML_CUDA_F16=ON ^
            -DTURBO4_USE_4BIT=1 ^
            -DCMAKE_CUDA_ARCHITECTURES=75 ^
            -DGGML_CUDA_COMPRESSION_MODE=size ^
            -DBUILD_SHARED_LIBS=OFF ^
            -DGGML_NATIVE=OFF ^
            -DCMAKE_C_COMPILER_LAUNCHER=ccache ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ^
            -DCMAKE_CUDA_COMPILER_LAUNCHER=ccache

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake --build build --config Release -j %NUMBER_OF_PROCESSORS%

      - name: Package and split archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item .\build\bin\Release\* dist\ -Recurse -Force

          & "C:\Program Files\7-Zip\7z.exe" a `
            -t7z `
            -mx=9 `
            -v1900m `
            ".\Llama-Turboquant-Windows-1650-CUDA-13.2.7z" `
            ".\dist\*"

      - name: Upload workflow artifact parts
        uses: actions/upload-artifact@v4
        with:
          name: llama-windows-1650-split
          path: Llama-Turboquant-Windows-1650-CUDA-13.2.7z.*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          files: Llama-Turboquant-Windows-1650-CUDA-13.2.7z.*
          tag_name: latest
          name: "Latest Build (Windows GTX 1650) - Split Archive"
          body: |
            Automated CUDA build for Windows GTX 1650 (compute capability 7.5).
            Turboquant flags preserved.
            Download all .7z.001/.7z.002 parts, then extract from the first part.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
